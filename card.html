<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智意行科技 名片設計 — 白底商務</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f8f6f1;
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
    -webkit-font-smoothing: antialiased;
    height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* ===== NAVBAR ===== */
  .page-navbar {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999;
    display: flex; align-items: center; gap: 10px; padding: 8px 16px;
    background: rgba(255,255,255,0.82); backdrop-filter: blur(20px) saturate(1.8);
    -webkit-backdrop-filter: blur(20px) saturate(1.8);
    border-radius: 52px; border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 4px 24px rgba(0,0,0,0.08); white-space: nowrap;
  }
  .nav-back {
    display: flex; align-items: center; gap: 6px; padding: 5px 14px;
    border-radius: 24px; font-size: 13px; font-weight: 600;
    color: #1a3a5c; text-decoration: none; transition: all 0.2s ease;
  }
  .nav-back:hover { background: rgba(26,58,92,0.06); }
  .nav-back svg { width: 16px; height: 16px; }
  .nav-title { font-size: 14px; font-weight: 700; color: #1a3a5c; letter-spacing: 0.3px; }

  /* ===== STAGE ===== */
  .stage {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 70px 24px 24px;
    position: relative; user-select: none;
    overflow: hidden;
  }

  /* Person info */
  .person-label {
    font-size: 14px; font-weight: 700; color: #1a3a5c;
    letter-spacing: 1px; text-align: center; margin-bottom: 4px;
  }
  .person-sublabel {
    font-size: 11px; color: #64748b; letter-spacing: 0.5px;
    text-align: center; margin-bottom: 16px;
  }

  /* Card flipper */
  .card-scene {
    perspective: 1200px;
    width: 108mm; height: 64.8mm;
  }
  .card-flipper {
    position: relative; width: 100%; height: 100%;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    transform-style: preserve-3d;
  }
  .card-flipper.flipped {
    transform: rotateX(-180deg);
  }
  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .card-face-back {
    transform: rotateX(180deg);
  }

  /* ===== BASE CARD ===== */
  .card {
    width: 100%; height: 100%;
    border-radius: 3.5mm; position: relative; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.08);
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 5.5mm 6mm;
  }
  .top { display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .logo { width: 16mm; height: 16mm; border-radius: 3mm; overflow: hidden; flex-shrink: 0; }
  .logo img { width: 100%; height: 100%; object-fit: cover; }
  .co { display: flex; flex-direction: column; gap: 0.3mm; flex: 1; }
  .co-names { display: flex; align-items: baseline; gap: 2mm; }
  .co-zh { font-family: 'Noto Sans TC', sans-serif; font-size: 3.8mm; font-weight: 700; letter-spacing: 1.2px; }
  .co-en-sub { font-size: 5mm; font-weight: 700; letter-spacing: 0.5px; }
  .serif-i { font-family: 'Noto Serif TC', 'Times New Roman', serif; }
  .mid { position: relative; z-index: 1; }
  .sep { height: 0.4mm; margin-bottom: 2mm; }
  .name-row { display: flex; align-items: baseline; gap: 2mm; }
  .name-zh { font-family: 'Noto Serif TC', sans-serif; font-size: 6mm; font-weight: 900; letter-spacing: 2px; }
  .name-en { font-family: 'Inter', sans-serif; font-size: 5.4mm; font-weight: 700; letter-spacing: 0.8px; }
  .phd { font-size: 3.4mm; font-weight: 700; letter-spacing: 0.5px; }
  .phd-en { font-size: 2.6mm; font-weight: 500; letter-spacing: 0.3px; }
  .title { font-family: 'Noto Sans TC', sans-serif; font-size: 2.5mm; letter-spacing: 0.8px; margin-top: 1mm; }
  .bot { display: flex; flex-direction: column; gap: 1.3mm; position: relative; z-index: 1; align-self: flex-end; align-items: flex-start; }
  .crow { display: flex; align-items: center; gap: 2mm; }
  .ci-zh { font-family: 'Noto Sans TC', sans-serif; font-size: 2mm; font-weight: 600; flex-shrink: 0; letter-spacing: 0.5px; }
  .ci-en { font-family: 'Inter', sans-serif; font-size: 1.8mm; font-weight: 600; flex-shrink: 0; letter-spacing: 0.3px; width: 8mm; }
  .ct { font-family: 'Inter', 'Noto Sans TC', sans-serif; font-size: 2.2mm; letter-spacing: 0.2px; }
  .addr-wrap { line-height: 1.6; }

  /* Style B */
  .style-b { background: #ffffff; border: 0.2mm solid #eae6e2; }
  .style-b::before { content: ''; position: absolute; top: 0; left: 0; width: 1.2mm; height: 100%; background: linear-gradient(180deg, #1a3a5c, #c06a1a, #d4893a); border-radius: 3.5mm 0 0 3.5mm; }
  .style-b .co-zh { color: #1a3a5c; }
  .style-b .co-en-sub { color: #1a3a5c; }
  .style-b .co-en-sub .ac { color: #c06a1a; }
  .style-b .sep { background: linear-gradient(90deg, #c06a1a33, transparent); }
  .style-b .name-zh { color: #1a2d42; }
  .style-b .name-en { color: #1a2d42; }
  .style-b .phd { color: #c06a1a; }
  .style-b .phd-en { color: #6b7d8e; }
  .style-b .title { color: #6b7d8e; }
  .style-b .ci-zh, .style-b .ci-en { color: #c06a1a; }
  .style-b .ct { color: #7a8a9a; }

  /* Slide transition for person switching */
  .stage-slide {
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
  }
  .stage-slide.exit-left { transform: translateX(-120%); opacity: 0; }
  .stage-slide.exit-right { transform: translateX(120%); opacity: 0; }
  .stage-slide.enter-left { transform: translateX(-60%); opacity: 0; }
  .stage-slide.enter-right { transform: translateX(60%); opacity: 0; }

  /* ===== NAV ===== */
  .nav-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.85); backdrop-filter: blur(8px);
    border: 1px solid rgba(0,0,0,0.06); box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #1a3a5c; transition: all 0.2s ease; z-index: 10;
  }
  .nav-arrow:hover { background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
  .nav-arrow.disabled { opacity: 0.2; pointer-events: none; }
  .nav-arrow svg { width: 20px; height: 20px; }
  .nav-prev { left: 12px; }
  .nav-next { right: 12px; }

  /* Dots + side indicator */
  .controls {
    display: flex; flex-direction: column; align-items: center; gap: 6px; margin-top: 16px;
  }
  .dots { display: flex; gap: 10px; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #d4cfc4; cursor: pointer; transition: all 0.3s ease;
  }
  .dot.active { background: #1a3a5c; transform: scale(1.2); }
  .side-label {
    font-size: 10px; color: #94a3b8; letter-spacing: 1px;
    transition: all 0.3s ease;
  }
  .side-label.zh { color: #1a3a5c; font-weight: 600; }

  .swipe-hint {
    font-size: 10px; color: #b0a89a; letter-spacing: 0.5px;
    text-align: center; margin-top: 4px;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 760px) {
    .card-scene { width: 90vw; height: calc(90vw * 0.6); }
    .stage { padding: 64px 12px 16px; }
    .nav-arrow { width: 36px; height: 36px; }
    .nav-arrow svg { width: 16px; height: 16px; }
    .nav-prev { left: 4px; }
    .nav-next { right: 4px; }
    .page-navbar { top: 10px; padding: 6px 12px; }
    .nav-back { font-size: 12px; padding: 4px 10px; }
    .nav-title { font-size: 12px; }
  }
  @media (max-width: 480px) {
    .card-scene { width: 94vw; height: calc(94vw * 0.6); }
    .stage { padding: 58px 6px 12px; }
    .page-navbar { top: 8px; padding: 5px 10px; }
    .nav-title { display: none; }
    .person-label { font-size: 13px; }
    .controls { margin-top: 10px; }
  }
  @media print {
    body { overflow: visible; height: auto; }
    .page-navbar, .nav-arrow, .controls, .swipe-hint { display: none; }
    .stage { overflow: visible; padding: 20px; }
    .card-flipper { transform: none !important; }
    .card-face-back { display: none; }
  }
</style>
</head>

  <button class="nav-arrow nav-next" id="btnNext" aria-label="Next person">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>

  <div id="personLabel" class="person-label"></div>

      <div class="bot"><div class="crow"><span class="ci-zh">電話</span><span class="ct">+886 983-088-254</span></div><div class="crow"><span class="ci-zh">信箱</span><span class="ct">eddlai.be10@nycu.edu.tw</span></div><div class="crow"><span class="ci-zh">地址</span><span class="ct">103台北市大同區延平北路二段202號17樓之2</span></div><div class="crow"><span class="ci-zh">統編</span><span class="ct">60331893</span></div></div>
    </div>`,
    back: `<div class="card style-b">
      <div class="top"><div class="co"><div class="co-names"><span class="co-en-sub"><span class="ac">a<span class="serif-i">I</span></span>walk Co., Ltd.</span></div></div><div class="logo"><img src="${LOGO_SRC}" alt="logo"></div></div>
      <div class="mid"><div class="sep"></div><div class="title">CTO &amp; Co-Founder</div><div class="name-row"><span class="name-en">Eddie Lai</span></div></div>
      <div class="bot"><div class="crow"><span class="ci-en">Tel</span><span class="ct">+886 983-088-254</span></div><div class="crow"><span class="ci-en">Email</span><span class="ct">eddlai.be10@nycu.edu.tw</span></div><div class="crow"><span class="ci-en">Addr</span><span class="ct addr-wrap">17F-2, No. 202, Sec. 2, Yanping N. Rd.,<br>Datong Dist., Taipei 103, Taiwan (R.O.C.)</span></div></div>
    </div>`
  }
];

let current = 0;
let isFlipped = false;
const scene = document.getElementById('cardScene');
const flipper = document.getElementById('cardFlipper');
const frontEl = document.getElementById('cardFront');
const backEl = document.getElementById('cardBack');
const label = document.getElementById('personLabel');
const sublabel = document.getElementById('personSublabel');
const sideLabel = document.getElementById('sideLabel');
const dotsEl = document.getElementById('dots');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const hint = document.getElementById('swipeHint');

// Create dots
PEOPLE.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.addEventListener('click', () => goToPerson(i));
  dotsEl.appendChild(d);
});

function renderPerson(idx) {
  const p = PEOPLE[idx];
  label.textContent = p.name;
  sublabel.textContent = p.sub;
  frontEl.innerHTML = p.front;
  backEl.innerHTML = p.back;
  dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  btnPrev.classList.toggle('disabled', idx === 0);
  btnNext.classList.toggle('disabled', idx === PEOPLE.length - 1);
}

function setFlip(flip) {
  isFlipped = flip;
  flipper.classList.toggle('flipped', flip);
  sideLabel.textContent = flip ? '背面 BACK (EN)' : '正面 FRONT';
  sideLabel.classList.toggle('zh', !flip);
}

function goToPerson(idx, direction) {
  if (idx < 0 || idx >= PEOPLE.length || idx === current) return;
  const dir = direction || (idx > current ? 'left' : 'right');
  // Exit animation
  scene.classList.add('exit-' + dir);
  setTimeout(() => {
    current = idx;
    setFlip(false);
    renderPerson(idx);
    scene.classList.remove('exit-' + dir);
    scene.classList.add('enter-' + (dir === 'left' ? 'right' : 'left'));
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        scene.classList.remove('enter-right', 'enter-left');
      });
    });
  }, 280);
}

// Arrow buttons
btnPrev.addEventListener('click', () => goToPerson(current - 1, 'right'));
btnNext.addEventListener('click', () => goToPerson(current + 1, 'left'));

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') goToPerson(current - 1, 'right');
  if (e.key === 'ArrowRight') goToPerson(current + 1, 'left');
  if (e.key === 'ArrowDown') { e.preventDefault(); setFlip(true); }
  if (e.key === 'ArrowUp') { e.preventDefault(); setFlip(false); }
});

// Touch swipe — horizontal = switch person, vertical = flip
let tx0 = 0, ty0 = 0, swiping = false;
const stageEl = document.getElementById('stage');
stageEl.addEventListener('touchstart', (e) => {
  tx0 = e.touches[0].clientX;
  ty0 = e.touches[0].clientY;
  swiping = true;
}, { passive: true });
stageEl.addEventListener('touchend', (e) => {
  if (!swiping) return;
  swiping = false;
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (absDx < 30 && absDy < 30) return; // tap, not swipe
  if (absDx > absDy) {
    // Horizontal swipe
    if (dx < -50) goToPerson(current + 1, 'left');
    else if (dx > 50) goToPerson(current - 1, 'right');
  } else {
    // Vertical swipe
    if (dy > 40) setFlip(true);    // down = flip to back
    else if (dy < -40) setFlip(false); // up = flip to front
  }
});

// Hide hint after first interaction
let hintShown = true;
function hideHint() {
  if (hintShown) { hint.style.opacity = '0'; hintShown = false; }
}
stageEl.addEventListener('touchstart', hideHint, { once: true });
document.addEventListener('keydown', hideHint, { once: true });

// Init
renderPerson(0);
</script>
</body>
</html>
